<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 1000" role="img" aria-label="Balneário Hair Institute">
  <!-- Background navy -->
  <rect width="1000" height="1000" fill="#0A1128"/>

  <!-- Outer vertical bars (estrutura externa do monograma "H") -->
  <rect x="368" y="285" width="40" height="520" fill="#FFFFFF"/>
  <rect x="592" y="285" width="40" height="520" fill="#FFFFFF"/>

  <!-- Circulo central (O) -->
  <circle cx="500" cy="525" r="165" stroke="#FFFFFF" stroke-width="22" fill="none"/>

  <!-- Linhas internas curtas (formando "II" ou "H" menor dentro do circulo) -->
  <rect x="438" y="430" width="34" height="195" fill="#FFFFFF"/>
  <rect x="528" y="430" width="34" height="195" fill="#FFFFFF"/>
</svg>
